<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Creative Portfolio</title>
    <!-- Font Modern -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Icon -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* --- RESET & BASIC --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            padding: 40px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #666;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        nav a:hover {
            color: #000;
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 60px 5% 40px;
            max-width: 800px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero p {
            color: #666;
            font-size: 1.1rem;
        }

        /* --- CATEGORY SECTION --- */
        .category-section {
            padding: 40px 0;
        }

        .category-title {
            padding: 0 5%;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .category-title h2 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        /* --- SLIDER (Horizontal Scroll) --- */
        .slider-container {
            display: flex;
            overflow-x: auto;
            padding: 10px 5%;
            gap: 20px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }

        .slider-container::-webkit-scrollbar {
            display: none; /* Hide scrollbar Chrome/Safari */
        }

        .portfolio-item {
            flex: 0 0 auto;
            scroll-snap-align: start;
            border-radius: 24px;
            overflow: hidden;
            background: #f4f4f4;
            transition: transform 0.4s ease;
        }

        .portfolio-item:hover {
            transform: scale(0.98);
        }

        /* Menyesuaikan berbagai Aspect Ratio */
        .portfolio-item img {
            display: block;
            height: 400px; /* Tinggi tetap di desktop agar rapi */
            width: auto;   /* Lebar otomatis mengikuti aspect ratio gambar */
            max-width: 600px;
            object-fit: cover;
            border-radius: 24px;
        }

        /* --- FOOTER --- */
        footer {
            padding: 100px 5% 50px;
            text-align: center;
            color: #999;
            font-size: 0.8rem;
        }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 768px) {
            header { padding: 20px 5%; }
            .hero { padding: 40px 5%; }
            
            .portfolio-item img {
                height: 300px; /* Tinggi lebih pendek di HP */
                max-width: 85vw;
            }

            .category-title h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">STUDIO.JS</div>
        <nav>
            <a href="#">Work</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Digital Artist & Visual Designer.</h1>
        <p>Koleksi hasil karya pilihan dalam desain grafis, ilustrasi, dan fotografi.</p>
    </section>

    <!-- KATEGORI 1 -->
    <div class="category-section">
        <div class="category-title">
            <h2>Digital Illustration</h2>
            <p style="color: #999; font-size: 0.8rem;">Geser &rarr;</p>
        </div>
        <div class="slider-container">
            <!-- Gambar Portofolio (Ganti src dengan link gambar Anda) -->
            <div class="portfolio-item">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=800" alt="Work 1">
            </div>
            <div class="portfolio-item">
                <img src="https://images.unsplash.com/photo-1633167606207-d840b5070fc2?auto=format&fit=crop&q=80&w=600" alt="Work 2">

            </div>

            </div>
        </div>
    </div>

    <!-- KATEGORI 2 -->
    <div class="category-section">
        <div class="category-title">

        </div>
        <div class="slider-container">
            <div class="portfolio-item">
                <img src="https://images.unsplash.com/photo-1626785774573-4b799315345d?auto=format&fit=crop&q=80&w=800" alt="Work 5">
            </div>
            <div class="portfolio-item">
                <img src="https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?auto=format&fit=crop&q=80&w=800" alt="Work 6">
            </div>
            <div class="portfolio-item">
                <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=1000" alt="Work 7">
            </div>
        </div>
    </div>

    <!-- KATEGORI 3 -->
    <div class="category-section">
        <div class="category-title">
            <h2>Photography</h2>
            <p style="color: #999; font-size: 0.8rem;">Geser &rarr;</p>
        </div>
        <div class="slider-container">
            <div class="portfolio-item">
                <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=600" alt="Work 8">
            </div>
            <div class="portfolio-item">
                <img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?auto=format&fit=crop&q=80&w=1200" alt="Work 9">
            </div>
            <div class="portfolio-item">

            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Nama Kamu. Dibuat dengan dedikasi.</p>
    </footer>

</body>
